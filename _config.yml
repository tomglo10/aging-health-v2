# Aging Health Research 2026 - Site Configuration
theme: jekyll-theme-chirpy
lang: en
timezone: America/Chicago

# SEO & Title Settings
title: "Aging Health Research 2026"
tagline: "Independent health research and patient advocacy."
description: >-
  Independent health research focusing on translating clinical data into
  health literacy for seniors and patient advocates.

# Primary URL Settings (Do not duplicate)
url: "https://aginghealth.website"
baseurl: ""

github:
  username: tomglo10

# Author & Social Information
author:
  name: "Tommy T. Douglas"
  avatar: /assets/img/avatar.jpg
  bio: "Independent Health Researcher & Patient Advocate. Heart attack survivor translating clinical data into health literacy for seniors."
  email: tommglo@gmail.com
  links:
    - title: GitHub
      url: https://github.com/tomglo10
      icon: "fab fa-github"
    - title: Website
      url: https://aginghealth.website
      icon: "fas fa-globe"
    - title: Buy Me A Coffee
      url: https://buymeacoffee.com/aginghealth
      icon: "fas fa-coffee"

# Site Verification
webmaster_verifications:
  google: 8jNPrMc_j1AKuq9gHKgW1NIQ_smBfBprWRZRyT5kgZM
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# Analytics
analytics:
  google:
    id: G-DYSMMKT4C7

# UI & Feature Settings
toc: true
paginate: 10
theme_mode: # [light | dark] - Leave empty for system default

# Manual Sidebar Whitelist
# This forces the tabs to appear in this exact order
tabs:
  - archives
  - categories
  - tags
  - about
  - lbd-safety-checklist
  - how-we-research
  - patient-tools
  - home-safety-checklist

# Collections Configuration
collections:
  tabs:
    output: true
    sort_by: order

# Path & Layout Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Advanced Build Settings
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true
      start_line: 1

sass:
  style: compressed

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
