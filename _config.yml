# Aging Health Research 2026
theme: jekyll-theme-chirpy
lang: en
timezone: America/Chicago

title: "Aging Health Research 2026"
tagline: "Independent health research and patient advocacy."
description: "Translating 2026 clinical data into health literacy for seniors."
url: "https://aginghealth.website"
baseurl: ""

github:
  username: tomglo10

author:
  name: "Tommy T. Douglas"
  avatar: /assets/img/avatar.jpg
  bio: "Independent Health Researcher & Patient Advocate. Heart attack survivor."
  email: tommglo@gmail.com
  links:
    - title: GitHub
      url: https://github.com/tomglo10
      icon: "fab fa-github"
    - title: Website
      url: https://aginghealth.website
      icon: "fas fa-globe"

# Analytics & Cookies
analytics:
  google:
    id: G-DYSMMKT4C7

# ENABLING COOKIE NOTICE
cookie_notice:
  enabled: true

# Sidebar Logic
tabs:
  - archives
  - categories
  - tags
  - about
  - lbd-safety-checklist
  - how-we-research
  - patient-tools
  - home-safety-checklist
  - privacy-policy

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

exclude:
  - "*.gem"
  - README.md
  - LICENSE
