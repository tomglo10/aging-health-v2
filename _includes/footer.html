<div id="cookie-notice" style="display: none; position: fixed; bottom: 20px; right: 20px; width: 300px; background: #1a202c; color: white; padding: 1.2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 999999; font-family: sans-serif; border-bottom: 4px solid #1565c0;">
  <p style="margin: 0 0 1rem 0; font-size: 0.85rem; line-height: 1.5;">
    <strong>Privacy & Literacy:</strong> I use cookies to see which research helps the most. <a href="/privacy-policy/" style="color: #63b3ed;">Policy</a>.
  </p>
  <button onclick="acceptCookies()" style="width: 100%; background: #1565c0; color: white; border: none; padding: 0.5rem; border-radius: 5px; cursor: pointer; font-weight: bold;">Understood</button>
</div>

<script>
  if (!localStorage.getItem('agingHealthConsent')) {
    document.getElementById('cookie-notice').style.display = 'block';
  }
  function acceptCookies() {
    localStorage.setItem('agingHealthConsent', 'true');
    document.getElementById('cookie-notice').style.display = 'none';
  }
</script>
