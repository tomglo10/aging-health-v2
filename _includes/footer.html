<footer class="footer mt-auto py-3 bg-light">
  <div class="container text-center">
    <span class="text-muted">© 2026 Aging Health Research | Tommy T. Douglas</span>
    <div class="footer-links mt-2">
      <a href="{{ '/how-we-research/' | relative_url }}" class="mx-2">How We Research</a> |
      <a href="{{ '/about/' | relative_url }}" class="mx-2">About</a> |
      <a href="{{ '/privacy-policy/' | relative_url }}" class="mx-2">Privacy</a>
    </div>
  </div>
</footer>
<div id="cookie-notice" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; background: #2d3748; color: #fff; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 9999; font-family: sans-serif; border-left: 5px solid #1565c0;">
  <div style="display: flex; flex-direction: column; gap: 1rem;">
    <p style="margin: 0; font-size: 0.95rem; line-height: 1.5;">
      <strong>Privacy & Health Literacy:</strong> This site uses cookies (Google Analytics) to help me understand which research topics are most helpful to the community. By continuing, you agree to our <a href="/privacy-policy/" style="color: #63b3ed; text-decoration: underline;">Privacy Policy</a>.
    </p>
    <button onclick="acceptCookies()" style="background: #1565c0; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 4px; cursor: pointer; font-weight: bold; align-self: flex-end;">
      Understood
    </button>
  </div>
</div>

<script>
  function acceptCookies() {
    localStorage.setItem('agingHealthConsent', 'true');
    document.getElementById('cookie-notice').style.display = 'none';
  }

  // Check if user has already consented
  window.onload = function() {
    if (!localStorage.getItem('agingHealthConsent')) {
      document.getElementById('cookie-notice').style.display = 'block';
    }
  };
</script>
